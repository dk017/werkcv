services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-werkcv}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: ${WERKCV_IMAGE:?Set WERKCV_IMAGE to a pushed GHCR image tag}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-werkcv}
      APP_BUILD_ID: ${APP_BUILD_ID:-local}
      NEXT_PUBLIC_APP_BUILD_ID: ${APP_BUILD_ID:-local}
      PROFILE_PHOTO_STORAGE_DIR: /app/storage/profile-photos
    volumes:
      - profile_photo_storage:/app/storage/profile-photos

volumes:
  postgres_data:
  profile_photo_storage:
